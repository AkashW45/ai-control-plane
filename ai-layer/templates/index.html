<!DOCTYPE html>
<html>
<head>
    <title>AI Generated Runbooks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

<div class="container">
    <h2>AI Generated Runbooks</h2>

    <!-- Fetch Jira -->
    <form method="post" action="/fetch-jira" class="row mb-4">
        <div class="col-md-4">
            <label class="form-label">Jira Issue Key</label>
            <input type="text" name="jira_key" class="form-control" placeholder="DEV-123">
        </div>

        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-outline-secondary w-100">
                Fetch Jira
            </button>
        </div>
    </form>

    <!-- Generate -->
    <form method="post" action="/generate">
        <div class="mb-3">
            <label class="form-label">Prompt</label>
            <textarea class="form-control" name="prompt" rows="5">
{{ prefill_prompt if prefill_prompt else '' }}
            </textarea>
        </div>

        <button type="submit" class="btn btn-primary">
            Generate Job
        </button>
    </form>

</div>

</body>
</html>
