<!DOCTYPE html>
<html>
<head>
    <title>AI Runbook Automation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-body">

            <h3 class="mb-4">AI Generated Runbooks</h3>

            <form method="post" action="/generate">

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Jira Issue Key</label>
                        <input type="text" name="jira_key" class="form-control" placeholder="DEV-123">
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" formaction="/fetch-jira" class="btn btn-outline-secondary w-100">
                            Fetch Jira
                        </button>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Prompt</label>
                    <textarea class="form-control" name="prompt" rows="5" placeholder="Describe the task...">
                       {{ prefill_prompt if prefill_prompt else '' }}
                    </textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    Generate Job
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
