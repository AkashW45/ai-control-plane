<!DOCTYPE html>
<html>
<head>
    <title>Job Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">

            <h3>Job Preview</h3>
            <p><strong>Name:</strong> {{ preview.name }}</p>
            <p><strong>Description:</strong> {{ preview.description }}</p>

            <h5>Steps</h5>
            <ul class="list-group">
                {% for step in preview.steps %}
                <li class="list-group-item">
                    <strong>{{ step.description }}</strong>
                    <pre class="mt-2">{{ step.command }}</pre>
                </li>
                {% endfor %}
            </ul>

            <div class="mt-4">
                <a href="/" class="btn btn-secondary">Back</a>
                <a href="http://localhost" class="btn btn-success">Continue to Rundeck</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
