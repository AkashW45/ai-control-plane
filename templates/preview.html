
<!DOCTYPE html>
<html>
<head>
    <title>AI Runbook Preview</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            padding: 40px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            max-width: 800px;
            margin: auto;
        }
        h2 {
            margin-top: 0;
        }
        textarea {
            width: 100%;
            height: 250px;
            font-family: monospace;
            padding: 10px;
        }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .meta {
            font-size: 14px;
            color: gray;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>AI Generated Runbook</h2>
        <p class="meta">Issue: {issue_key}</p>

        <form action="/execute" method="post">
            <textarea name="plan_json">{json.dumps(plan, indent=2)}</textarea>
            <br><br>
            <button class="btn" type="submit">Execute Runbook</button>
        </form>
    </div>
</body>
</html>
